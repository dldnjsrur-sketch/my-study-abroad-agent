name: Daily Study Abroad Projects Update

on:
  schedule:
    # 每天 UTC 时间 0:00 (北京时间上午 8:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv

      - name: Run daily updater
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LLM_API_KEY: ${{ secrets.VITE_LLM_API_KEY }}
          VITE_LLM_BASE_URL: ${{ secrets.VITE_LLM_BASE_URL }}
        run: python daily_updater.py
